<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Consume & Grow</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #8fce00;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Prevents mobile scrolling while playing */
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.4); /* Transparent dark background */
            padding: 12px; /* Smaller padding */
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 170px; /* Much smaller width */
            pointer-events: none; /* Lets clicks pass through the background */
            backdrop-filter: blur(4px);
        }

        h2 { margin: 0 0 10px 0; font-size: 14px; color: white; text-align: left; }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 12px; /* Smaller text */
            margin-bottom: 6px;
            color: #eee; /* Lighter text for dark background */
        }

        .stat-value { color: #ffde00; font-size: 13px; }

        .control-group {
            margin-top: 12px;
            pointer-events: auto; /* Re-enable clicks for sliders */
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #ddd;
            margin-bottom: 4px;
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #ffde00;
        }

        button {
            pointer-events: auto;
            width: 100%;
            padding: 8px; /* Smaller button padding */
            margin-top: 10px;
            background-color: #ff5e00;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px; /* Smaller button text */
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #e05300; }
        
        #instructions {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #debug-controls {
            display: none; /* Hidden by default */
        }

        #level-complete-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .level-passed-text {
            font-size: 70px;
            color: #ffde00;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 20px #ff7300;
            margin-bottom: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transform: scale(0);
            opacity: 0;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            to { transform: scale(1) rotate(-2deg); opacity: 1; }
        }

        .buttons-row {
            display: flex;
            gap: 20px;
            transform: translateY(50px);
            opacity: 0;
            animation: slideUp 0.6s ease forwards 0.4s;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .stylized-btn {
            padding: 15px 30px;
            font-size: 22px;
            border-radius: 12px;
            border: 3px solid white;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .restart-btn { background-color: #ff5e00; color: white; }
        .restart-btn:hover { background-color: #e05300; transform: scale(1.05); }
        .next-btn { background-color: #8fce00; color: white; }
        .next-btn:hover { background-color: #7ab300; transform: scale(1.05); }

        /* Game Complete Overlay Styles */
        #game-complete-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        .social-row { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .social-btn {
            padding: 12px 24px; text-decoration: none; color: white;
            font-weight: bold; border-radius: 8px; font-size: 16px;
            transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .social-btn:hover { transform: scale(1.1); }
        .yt-btn { background-color: #FF0000; }
        .in-btn { background-color: #0077b5; }
        .ig-btn { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .donate-btn { background-color: #ffde00; color: #333; font-size: 18px; padding: 15px 30px; border-color: #ffde00; margin-top: 10px;}
        .donate-btn:hover { background-color: #e6c800; transform: scale(1.05); }

        /* Donate Popup Styles */
        #donate-popup {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.92);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(10px);
        }
        .donate-card {
            background: #1a1a1a;
            padding: 35px;
            border-radius: 16px;
            border: 3px solid #ffde00;
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .wallet-address {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            word-break: break-all;
            margin: 25px 0;
            font-family: monospace;
            color: #ffde00;
            font-size: 18px;
        }
    </style>

    <script>
        // --- Game Variables ---
        let scene, camera, renderer, world;
        let groundMesh, groundBody, holeMesh;
        let cubes = [];
        let decorations = []; // For non-eatable objects like runways or roads
        let mouse = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();
        let groundPlane; // Mathematical plane for raycasting
        
        // Gameplay Stats
        let isPlaying = true;
        let score = 0;
        let sizeLevel = 1;
        let baseRadius = 0.5; // VERY SMALL INITIAL SIZE
        let currentRadius = baseRadius;
        let lastScaleScore = 0;
        
        // Dynamic Level Management System
        let currentLevelIndex = 0; 

        // --- Audio System Variables ---
        let audioCtx;
        let lastEatSoundTime = 0;

        // Constants
        const CUBE_GROUP = 1;
        const GROUND_GROUP = 2;

        document.addEventListener('DOMContentLoaded', function() {
            initEngine();
            initAudio();
            setupUI();
            startLevel();
            animate();
        });

        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            // Browsers require a user interaction to start audio processing
            document.addEventListener('pointerdown', () => {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }, { once: true });
        }

        function playEatSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            if (audioCtx.currentTime - lastEatSoundTime < 0.04) return;
            lastEatSoundTime = audioCtx.currentTime;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(300 + Math.random() * 100, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function playGrowSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.3);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playVictorySound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            
            [300, 375, 450, 600].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'square';
                osc.frequency.value = freq;
                
                let startTime = audioCtx.currentTime + i * 0.1;
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.08, startTime + 0.05);
                gain.gain.linearRampToValueAtTime(0, startTime + 0.3);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(startTime);
                osc.stop(startTime + 0.3);
            });
        }

        function initEngine() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x8fce00); 
            scene.fog = new THREE.Fog(0x8fce00, 20, 60);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 25, 20); 
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 30, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.left = -20;
            dirLight.shadow.camera.right = 20;
            dirLight.shadow.camera.top = 20;
            dirLight.shadow.camera.bottom = -20;
            scene.add(dirLight);

            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0); 
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 20;

            const physicsMaterial = new CANNON.Material("standard");
            const physicsContactMaterial = new CANNON.ContactMaterial(
                physicsMaterial, physicsMaterial, 
                { friction: 0.6, restitution: 0.0 } // Prevent physics explosions
            );
            world.addContactMaterial(physicsContactMaterial);

            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x8fce00 });
            groundMesh = new THREE.Mesh(groundGeo, groundMat);
            groundMesh.rotation.x = -Math.PI / 2;
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);

            const groundShape = new CANNON.Plane();
            groundBody = new CANNON.Body({ mass: 0, material: physicsMaterial });
            groundBody.addShape(groundShape);
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            groundBody.collisionFilterGroup = GROUND_GROUP;
            world.addBody(groundBody);

            const holeGeo = new THREE.CircleGeometry(1, 32);
            const holeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            holeMesh = new THREE.Mesh(holeGeo, holeMat);
            holeMesh.rotation.x = -Math.PI / 2;
            holeMesh.position.y = 0.08; 
            holeMesh.renderOrder = 10; 
            holeMesh.scale.set(currentRadius, currentRadius, 1);
            scene.add(holeMesh);

            groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onPointerMove);
            document.addEventListener('touchmove', onPointerMove, { passive: false });
        }

        function setupUI() {
            const thresholdSlider = document.getElementById('threshold-slider');
            const thresholdVal = document.getElementById('threshold-val');
            thresholdSlider.addEventListener('input', (e) => {
                thresholdVal.innerText = `${e.target.value} cubes`;
            });

            const multiplierSlider = document.getElementById('multiplier-slider');
            const multiplierVal = document.getElementById('multiplier-val');
            multiplierSlider.addEventListener('input', (e) => {
                multiplierVal.innerText = `${parseFloat(e.target.value).toFixed(2)}x`;
            });

            document.getElementById('restart-btn').addEventListener('click', startLevel);

            const menuToggle = document.getElementById('menu-toggle');
            const uiBody = document.getElementById('ui-body');
            menuToggle.addEventListener('click', () => {
                if (uiBody.style.display === 'none' || uiBody.style.display === '') {
                    uiBody.style.display = 'block';
                    menuToggle.innerHTML = '&#9650;';
                } else {
                    uiBody.style.display = 'none';
                    menuToggle.innerHTML = '&#9660;';
                }
            });

            window.addEventListener('keydown', (e) => {
                if (e.ctrlKey && (e.key === 'l' || e.key === 'L')) {
                    e.preventDefault();
                    const debugPanel = document.getElementById('debug-controls');
                    
                    if (debugPanel.style.display === 'none' || debugPanel.style.display === '') {
                        uiBody.style.display = 'block';
                        menuToggle.innerHTML = '&#9650;';
                        debugPanel.style.display = 'block';
                    } else {
                        debugPanel.style.display = 'none';
                    }
                }
            });

            document.getElementById('overlay-restart-btn').addEventListener('click', startLevel);
            document.getElementById('overlay-next-btn').addEventListener('click', () => {
                currentLevelIndex++;
                if (currentLevelIndex >= levels.length) {
                    currentLevelIndex = 0;
                }
                startLevel();
            });

            // Debug Menu Next Level Button
            document.getElementById('debug-next-btn').addEventListener('click', () => {
                if (currentLevelIndex >= levels.length - 1) {
                    isPlaying = false;
                    showGameComplete();
                    playVictorySound();
                } else {
                    currentLevelIndex++;
                    startLevel();
                }
            });

            // Game Complete Menu Buttons
            document.getElementById('play-again-btn').addEventListener('click', () => {
                currentLevelIndex = 0;
                startLevel();
            });

            document.getElementById('donate-btn').addEventListener('click', () => {
                document.getElementById('donate-popup').style.display = 'flex';
            });

            document.getElementById('close-donate-btn').addEventListener('click', () => {
                document.getElementById('donate-popup').style.display = 'none';
            });

            // Copy Wallet Address Logic
            document.getElementById('copy-wallet-btn').addEventListener('click', () => {
                const walletText = document.getElementById('wallet-text').innerText;
                
                // Using fallback for clipboard to ensure it works in all iframe/mobile environments
                const textArea = document.createElement("textarea");
                textArea.value = walletText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    const copyBtn = document.getElementById('copy-wallet-btn');
                    copyBtn.innerText = "Copied!";
                    copyBtn.style.backgroundColor = "#8fce00"; // Green for success
                    
                    // Reset button after 2 seconds
                    setTimeout(() => {
                        copyBtn.innerText = "Copy Address";
                        copyBtn.style.backgroundColor = "#0077b5";
                    }, 2000);
                } catch (err) {
                    console.error('Unable to copy', err);
                }
                document.body.removeChild(textArea);
            });
        }

        function onPointerMove(event) {
            let clientX = event.clientX;
            let clientY = event.clientY;
            
            if (event.touches && event.touches.length > 0) {
                clientX = event.touches[0].clientX;
                clientY = event.touches[0].clientY;
            }

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function startLevel() {
            let levelData = levels[currentLevelIndex];

            isPlaying = true;
            score = 0;
            sizeLevel = 1;
            lastScaleScore = 0;
            currentRadius = baseRadius;
            
            // Update UI & Environment Dynamically
            document.getElementById('level-title-display').innerText = `Level ${currentLevelIndex + 1}: ${levelData.title}`;
            scene.background.setHex(levelData.bgColor);
            scene.fog.color.setHex(levelData.bgColor);
            groundMesh.material.color.setHex(levelData.bgColor);

            updateUI();
            
            // Hide Overlays if they were open
            document.getElementById('level-complete-overlay').style.display = 'none';
            document.getElementById('game-complete-overlay').style.display = 'none';

            holeMesh.scale.set(currentRadius, currentRadius, 1);

            cubes.forEach(c => {
                scene.remove(c.mesh);
                world.remove(c.body);
            });
            cubes = [];

            decorations.forEach(d => scene.remove(d));
            decorations = [];

            levelData.buildFunc();

            let thresholdSlider = document.getElementById('threshold-slider');
            thresholdSlider.value = levelData.threshold;
            document.getElementById('threshold-val').innerText = `${levelData.threshold} cubes`;
        }

        // Shared Geometry and Shape to improve web performance with many blocks
        const cubeSize = 0.4;
        const spacing = 0.42;
        const boxGeo = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);
        const boxShape = new CANNON.Box(new CANNON.Vec3(cubeSize/2, cubeSize/2, cubeSize/2));

        const mMult = 3; 
        const mSpacing = spacing * mMult;
        const mCubeSize = cubeSize * mMult;
        const largeBoxGeo = new THREE.BoxGeometry(mCubeSize, mCubeSize, mCubeSize);
        const largeBoxShape = new CANNON.Box(new CANNON.Vec3(mCubeSize/2, mCubeSize/2, mCubeSize/2));

        const materials = {
            // Level 1
            wood: new THREE.MeshLambertMaterial({ color: 0x8B4513 }),
            sand: new THREE.MeshLambertMaterial({ color: 0xEEDD82 }),
            slideBlue: new THREE.MeshLambertMaterial({ color: 0x4682B4 }),
            slideRed: new THREE.MeshLambertMaterial({ color: 0xFF4500 }),
            leaves: new THREE.MeshLambertMaterial({ color: 0x228B22 }),
            trunk: new THREE.MeshLambertMaterial({ color: 0x5C4033 }),
            gym1: new THREE.MeshLambertMaterial({ color: 0xFFD700 }),
            gym2: new THREE.MeshLambertMaterial({ color: 0xFF69B4 }),
            blackRubber: new THREE.MeshLambertMaterial({ color: 0x222222 }),
            metalGray: new THREE.MeshLambertMaterial({ color: 0x999999 }),
            
            // Level 2 (Airplanes / Airport)
            planeWhite: new THREE.MeshLambertMaterial({ color: 0xFAFAFA }),
            planeRed: new THREE.MeshLambertMaterial({ color: 0xCC0000 }),
            planeBlue: new THREE.MeshLambertMaterial({ color: 0x0055AA }),
            glassBlue: new THREE.MeshLambertMaterial({ color: 0x88CCFF }),
            towerGray: new THREE.MeshLambertMaterial({ color: 0x999999 }),
            engineBlack: new THREE.MeshLambertMaterial({ color: 0x222222 }),
            heliGreen: new THREE.MeshLambertMaterial({ color: 0x4A5D23 }),

            // Level 3 (Cyberpunk)
            darkBuilding: new THREE.MeshLambertMaterial({ color: 0x111115 }),
            windowGlow: new THREE.MeshBasicMaterial({ color: 0xFFFF88 }),
            neonPink: new THREE.MeshBasicMaterial({ color: 0xFF00FF }),
            neonCyan: new THREE.MeshBasicMaterial({ color: 0x00FFFF }),
            neonPurple: new THREE.MeshBasicMaterial({ color: 0x8A2BE2 }),

            // Level 4 (Battlefield)
            sandDark: new THREE.MeshLambertMaterial({ color: 0xC2B280 }),
            camoGreen: new THREE.MeshLambertMaterial({ color: 0x4B5320 }),
            tankTreads: new THREE.MeshLambertMaterial({ color: 0x2F4F4F }),
            missileGray: new THREE.MeshLambertMaterial({ color: 0x708090 }),
            missileRed: new THREE.MeshLambertMaterial({ color: 0x8B0000 }),

            // Level 5 (Sugar Rush / Candyland)
            cakeChoco: new THREE.MeshLambertMaterial({ color: 0x4B3621 }),
            cakeVanilla: new THREE.MeshLambertMaterial({ color: 0xF3E5AB }),
            frostingPink: new THREE.MeshLambertMaterial({ color: 0xFF69B4 }),
            coneWafer: new THREE.MeshLambertMaterial({ color: 0xD2B48C }),
            candyRed: new THREE.MeshLambertMaterial({ color: 0xFF0000 }),
            candyCyan: new THREE.MeshLambertMaterial({ color: 0x00FFFF }),
            candyPurple: new THREE.MeshLambertMaterial({ color: 0x9370DB }),
            stickWhite: new THREE.MeshLambertMaterial({ color: 0xFFFFFF }),

            // Level 6 (Guitar Center)
            guitarSunburst: new THREE.MeshLambertMaterial({ color: 0xFF8C00 }),
            woodDark: new THREE.MeshLambertMaterial({ color: 0x3d2314 }),
            metalGold: new THREE.MeshLambertMaterial({ color: 0xFFD700 }),

            // Level 7 (Lush Forest)
            leafDark: new THREE.MeshLambertMaterial({ color: 0x1E4D2B }),
            leafLight: new THREE.MeshLambertMaterial({ color: 0x4C9A2A }),
            woodPine: new THREE.MeshLambertMaterial({ color: 0x4A3728 }),
            stoneGray: new THREE.MeshLambertMaterial({ color: 0x808080 })
        };

        function spawnCube(x, y, z, material) {
            let mesh = new THREE.Mesh(boxGeo, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            let body = new CANNON.Body({ mass: 0, type: CANNON.Body.STATIC }); 
            body.addShape(boxShape);
            body.position.set(x, y, z);
            
            body.linearDamping = 0.5;
            body.angularDamping = 0.5;
            
            body.collisionFilterGroup = CUBE_GROUP;
            body.collisionFilterMask = CUBE_GROUP | GROUND_GROUP;
            world.addBody(body);

            cubes.push({
                mesh: mesh,
                body: body,
                isFalling: false,
                isLargeBlock: false
            });
        }

        function spawnLargeCube(x, y, z, material) {
            let mesh = new THREE.Mesh(largeBoxGeo, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            let body = new CANNON.Body({ mass: 0, type: CANNON.Body.STATIC }); 
            body.addShape(largeBoxShape);
            body.position.set(x, y, z);
            
            body.linearDamping = 0.6;
            body.angularDamping = 0.6;
            
            body.collisionFilterGroup = CUBE_GROUP;
            body.collisionFilterMask = CUBE_GROUP | GROUND_GROUP;
            world.addBody(body);

            cubes.push({
                mesh: mesh,
                body: body,
                isFalling: false,
                isLargeBlock: true
            });
        }

        function spawnDecorationTexturedPlane(x, y, z, width, depth, colorCode) {
            const geo = new THREE.PlaneGeometry(width, depth);
            const mat = new THREE.MeshBasicMaterial({ color: colorCode });
            let mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.position.set(x, y, z); 
            mesh.renderOrder = 1; 
            scene.add(mesh);
            decorations.push(mesh);
        }

        // ==========================================
        // LEVEL MANAGER CONFIGURATION
        // ==========================================
        const levels = [
            {
                title: "Playground",
                bgColor: 0x8fce00, // Grass green
                buildFunc: buildPlayground,
                threshold: 15
            },
            {
                title: "Airport",
                bgColor: 0x4a4a4a, // Tarmac gray
                buildFunc: buildAirport,
                threshold: 20
            },
            {
                title: "Cyberpunk City",
                bgColor: 0x2a3040, // Gray-blueish night sky
                buildFunc: buildCity,
                threshold: 25
            },
            {
                title: "Battlefield",
                bgColor: 0xE6D0AB, // Desert sand color
                buildFunc: buildBattlefield,
                threshold: 30
            },
            {
                title: "Sugar Rush",
                bgColor: 0xFFB6C1, // Light pink frosting background
                buildFunc: buildCandyland,
                threshold: 21 
            },
            {
                title: "Guitar Center",
                bgColor: 0x2A1B38, // Vibrant deep purple
                buildFunc: buildGuitarCenter,
                threshold: 22
            },
            {
                title: "Lush Forest",
                bgColor: 0x243b25, // Deep forest green
                buildFunc: buildLushForest,
                threshold: 18
            }
        ];

        // ==========================================
        // LEVEL 1: PLAYGROUND BUILDERS
        // ==========================================
        function buildPlayground() {
            // Re-arranged layout for much better spacing
            buildSandbox(-7, 0, -6);
            buildSwingSet(-1, 0, -6); 
            buildToyCar(5, 0, -6);
            
            buildSlide(2, 0, 1);
            buildSeesaw(-4, 0, 3);
            buildPyramid(4, 0, 5);

            buildTree(-8, 0, 5);
            buildTree(8, 0, -2);
        }

        function buildSandbox(offsetX, offsetY, offsetZ) {
            for(let x = 0; x < 8; x++) {
                for(let z = 0; z < 8; z++) {
                    let isBorder = (x === 0 || x === 7 || z === 0 || z === 7);
                    let posX = offsetX + x * spacing;
                    let posZ = offsetZ + z * spacing;
                    
                    if (isBorder) {
                        spawnCube(posX, offsetY + 0.5, posZ, materials.wood);
                        spawnCube(posX, offsetY + 0.5 + spacing, posZ, materials.wood);
                    } else {
                        spawnCube(posX, offsetY + 0.5, posZ, materials.sand);
                    }
                }
            }
        }

        function buildSlide(offsetX, offsetY, offsetZ) {
            for(let z = 0; z < 3; z++) {
                for(let x = 0; x < 10; x++) {
                    let posX = offsetX + x * spacing;
                    let posZ = offsetZ + z * spacing;

                    if (x < 2) {
                        for(let y = 0; y < 6; y++) spawnCube(posX, offsetY + 0.5 + y * spacing, posZ, materials.slideBlue);
                    } else if (x >= 2 && x < 4) {
                        spawnCube(posX, offsetY + 0.5 + 5 * spacing, posZ, materials.slideBlue);
                    } else {
                        let slopeHeight = Math.floor(5 - (x - 4) * (5 / 6));
                        if(slopeHeight >= 0) spawnCube(posX, offsetY + 0.5 + slopeHeight * spacing, posZ, materials.slideRed);
                    }
                }
            }
        }

        function buildTree(offsetX, offsetY, offsetZ) {
            for(let y = 0; y < 5; y++) {
                for(let x = 0; x < 2; x++) {
                    for(let z = 0; z < 2; z++) {
                        spawnCube(offsetX + x * spacing, offsetY + 0.5 + y * spacing, offsetZ + z * spacing, materials.trunk);
                    }
                }
            }
            for(let y = 5; y < 9; y++) {
                let w = y === 8 ? 2 : 4; 
                let offset = y === 8 ? 0 : -1;
                for(let x = 0; x < w; x++) {
                    for(let z = 0; z < w; z++) {
                        if (y !== 8 && ((x===0&&z===0) || (x===0&&z===w-1) || (x===w-1&&z===0) || (x===w-1&&z===w-1))) continue;
                        spawnCube(offsetX + offset * spacing + x * spacing, offsetY + 0.5 + y * spacing, offsetZ + offset * spacing + z * spacing, materials.leaves);
                    }
                }
            }
        }

        function buildPyramid(offsetX, offsetY, offsetZ) {
            let layers = 4;
            for(let y = 0; y < layers; y++) {
                let size = (layers - y) * 2;
                let mat = y % 2 === 0 ? materials.gym1 : materials.gym2;
                for(let x = 0; x < size; x++) {
                    for(let z = 0; z < size; z++) {
                        spawnCube(offsetX + x * spacing + y * spacing, offsetY + 0.5 + y * spacing, offsetZ + z * spacing + y * spacing, mat);
                    }
                }
            }
        }

        function buildSwingSet(offsetX, offsetY, offsetZ) {
            for(let y=0; y<6; y++) {
                spawnCube(offsetX - 3*spacing, offsetY + 0.5 + y*spacing, offsetZ, materials.metalGray);
                spawnCube(offsetX + 3*spacing, offsetY + 0.5 + y*spacing, offsetZ, materials.metalGray);
            }
            for(let x=-2; x<=2; x++) {
                spawnCube(offsetX + x*spacing, offsetY + 0.5 + 5*spacing, offsetZ, materials.slideRed);
            }
            for(let y=2; y<5; y++) {
                spawnCube(offsetX - 1.5*spacing, offsetY + 0.5 + y*spacing, offsetZ, materials.metalGray);
                spawnCube(offsetX + 1.5*spacing, offsetY + 0.5 + y*spacing, offsetZ, materials.metalGray);
            }
            spawnCube(offsetX - 1.5*spacing, offsetY + 0.5 + 1*spacing, offsetZ, materials.wood);
            spawnCube(offsetX + 1.5*spacing, offsetY + 0.5 + 1*spacing, offsetZ, materials.wood);
        }

        function buildSeesaw(offsetX, offsetY, offsetZ) {
            spawnCube(offsetX, offsetY + 0.5, offsetZ, materials.gym1);
            spawnCube(offsetX, offsetY + 0.5 + spacing, offsetZ, materials.gym1);
            for(let x=-3; x<=3; x++) {
                spawnCube(offsetX + x*spacing, offsetY + 0.5 + 2*spacing, offsetZ, materials.wood);
            }
        }

        function buildToyCar(offsetX, offsetY, offsetZ) {
            for(let x=0; x<3; x++) {
                for(let z=0; z<2; z++) {
                    spawnCube(offsetX + x*spacing, offsetY + 0.5 + spacing, offsetZ + z*spacing, materials.slideBlue);
                }
            }
            spawnCube(offsetX + 1*spacing, offsetY + 0.5 + 2*spacing, offsetZ, materials.slideRed);
            spawnCube(offsetX + 1*spacing, offsetY + 0.5 + 2*spacing, offsetZ + spacing, materials.slideRed);
            spawnCube(offsetX, offsetY + 0.5, offsetZ - spacing, materials.blackRubber);
            spawnCube(offsetX + 2*spacing, offsetY + 0.5, offsetZ - spacing, materials.blackRubber);
            spawnCube(offsetX, offsetY + 0.5, offsetZ + 2*spacing, materials.blackRubber);
            spawnCube(offsetX + 2*spacing, offsetY + 0.5, offsetZ + 2*spacing, materials.blackRubber);
        }

        // ==========================================
        // LEVEL 2: AIRPORT BUILDERS
        // ==========================================
        function buildAirport() {
            spawnDecorationTexturedPlane(-2, 0.01, 0, 8, 50, 0x222222); 
            for (let z = -20; z < 20; z += 4) {
                spawnDecorationTexturedPlane(-2, 0.02, z, 0.6, 2, 0xFFFFFF); 
            }

            buildControlTower(8, 0, -8);
            buildBoeing747(-3, 0, -5, materials.planeBlue); 
            buildBoeing747(6, 0, 5, materials.planeRed);    
            
            buildHelicopter(-7, 0, 8);
            buildHelicopter(-9, 0, 3);
        }

        function buildControlTower(offsetX, offsetY, offsetZ) {
            for(let y = 0; y < 8; y++) {
                for(let x = 0; x < 3; x++) {
                    for(let z = 0; z < 3; z++) {
                        spawnCube(offsetX + x * spacing, offsetY + 0.5 + y * spacing, offsetZ + z * spacing, materials.towerGray);
                    }
                }
            }
            for(let y = 8; y < 10; y++) {
                for(let x = -1; x < 4; x++) {
                    for(let z = -1; z < 4; z++) {
                        if (x > 0 && x < 2 && z > 0 && z < 2) continue; 
                        spawnCube(offsetX + x * spacing, offsetY + 0.5 + y * spacing, offsetZ + z * spacing, materials.glassBlue);
                    }
                }
            }
            for(let x = -1; x < 4; x++) {
                for(let z = -1; z < 4; z++) {
                    spawnCube(offsetX + x * spacing, offsetY + 0.5 + 10 * spacing, offsetZ + z * spacing, materials.towerGray);
                }
            }
            spawnCube(offsetX + 1 * spacing, offsetY + 0.5 + 11 * spacing, offsetZ + 1 * spacing, materials.planeRed);
            spawnCube(offsetX + 1 * spacing, offsetY + 0.5 + 12 * spacing, offsetZ + 1 * spacing, materials.planeRed);
        }

        function buildBoeing747(offsetX, offsetY, offsetZ, accentMat) {
            for(let x = 0; x < 15; x++) {
                for(let y = 1; y < 4; y++) {
                    for(let z = 0; z < 3; z++) {
                        if (x > 1 && x < 13 && y === 2 && z === 1) continue;
                        
                        let mat = materials.planeWhite;
                        if (x === 0 && y === 2) mat = materials.glassBlue;
                        if (x > 12) mat = accentMat;

                        spawnCube(offsetX + x * spacing, offsetY + 0.5 + y * spacing, offsetZ + z * spacing, mat);
                    }
                }
            }
            
            for(let x = 2; x < 6; x++) {
                for(let z = 0; z < 3; z++) {
                    let mat = materials.planeWhite;
                    if(x === 2) mat = materials.glassBlue; 
                    spawnCube(offsetX + x * spacing, offsetY + 0.5 + 4 * spacing, offsetZ + z * spacing, mat);
                }
            }

            for(let x = 5; x < 10; x++) {
                let leftZ = -(x - 4); 
                for(let z = leftZ; z < 0; z++) {
                    spawnCube(offsetX + x * spacing, offsetY + 0.5 + 1 * spacing, offsetZ + z * spacing, materials.planeWhite);
                }
                let rightZ = 2 + (x - 4);
                for(let z = 3; z <= rightZ; z++) {
                    spawnCube(offsetX + x * spacing, offsetY + 0.5 + 1 * spacing, offsetZ + z * spacing, materials.planeWhite);
                }
                
                if (x === 6 || x === 8) {
                    spawnCube(offsetX + x * spacing, offsetY + 0.5 + 0 * spacing, offsetZ + (leftZ + 1) * spacing, materials.engineBlack);
                    spawnCube(offsetX + x * spacing, offsetY + 0.5 + 0 * spacing, offsetZ + (rightZ - 1) * spacing, materials.engineBlack);
                }
            }

            for(let x = 12; x < 15; x++) {
                for(let y = 4; y < 7; y++) {
                    if (x - 11 >= y - 3) { 
                        spawnCube(offsetX + x * spacing, offsetY + 0.5 + y * spacing, offsetZ + 1 * spacing, accentMat);
                    }
                }
                spawnCube(offsetX + x * spacing, offsetY + 0.5 + 2 * spacing, offsetZ - 1 * spacing, materials.planeWhite);
                spawnCube(offsetX + x * spacing, offsetY + 0.5 + 2 * spacing, offsetZ + 3 * spacing, materials.planeWhite);
            }
        }

        function buildHelicopter(offsetX, offsetY, offsetZ) {
            for(let x=0; x<4; x++) {
                for(let y=1; y<4; y++) {
                    for(let z=0; z<3; z++) {
                        let mat = materials.heliGreen;
                        if(x===0 && y===2) mat = materials.glassBlue;
                        spawnCube(offsetX + x * spacing, offsetY + 0.5 + y * spacing, offsetZ + z * spacing, mat);
                    }
                }
            }
            for(let x=4; x<9; x++) {
                spawnCube(offsetX + x * spacing, offsetY + 0.5 + 2 * spacing, offsetZ + 1 * spacing, materials.heliGreen);
            }
            spawnCube(offsetX + 8 * spacing, offsetY + 0.5 + 3 * spacing, offsetZ + 1 * spacing, materials.engineBlack);
            spawnCube(offsetX + 8 * spacing, offsetY + 0.5 + 1 * spacing, offsetZ + 1 * spacing, materials.engineBlack);
            
            spawnCube(offsetX + 2 * spacing, offsetY + 0.5 + 4 * spacing, offsetZ + 1 * spacing, materials.towerGray);
            for(let i=-2; i<=6; i++) { 
                spawnCube(offsetX + i * spacing, offsetY + 0.5 + 5 * spacing, offsetZ + 1 * spacing, materials.engineBlack);
                spawnCube(offsetX + 2 * spacing, offsetY + 0.5 + 5 * spacing, offsetZ + (i-1) * spacing, materials.engineBlack);
            }
        }

        // ==========================================
        // LEVEL 3: CYBERPUNK CITY BUILDERS
        // ==========================================
        function buildCity() {
            spawnDecorationTexturedPlane(0, 0.01, 0, 30, 30, 0x2a3040); 
            for (let i = -10; i <= 10; i += 5) {
                spawnDecorationTexturedPlane(i, 0.02, 0, 0.2, 30, 0xFF00FF); 
                spawnDecorationTexturedPlane(0, 0.02, i, 30, 0.2, 0x00FFFF); 
            }

            buildSkyscraper(-8, 0, -8, 5, 5, 12, materials.neonPink);
            buildSkyscraper(4, 0, -6, 4, 4, 18, materials.neonCyan);
            buildSkyscraper(-6, 0, 6, 6, 4, 10, materials.neonPurple);
            buildSkyscraper(6, 0, 5, 5, 5, 15, materials.neonCyan);
            buildSkyscraper(-1, 0, -1, 4, 4, 6, materials.neonPink);
        }

        function buildSkyscraper(offsetX, offsetY, offsetZ, widthL, depthL, heightL, accentMat) {
            for(let y = 0; y < heightL; y++) {
                for(let x = 0; x < widthL; x++) {
                    for(let z = 0; z < depthL; z++) {
                        if (x > 0 && x < widthL - 1 && z > 0 && z < depthL - 1) continue;

                        let mat = materials.darkBuilding;
                        if (y > 0 && y % 4 === 0) {
                            mat = accentMat; 
                        } else if (y % 2 !== 0 && (x === 1 || x === widthL - 2 || z === 1 || z === depthL - 2)) {
                            mat = materials.windowGlow; 
                        }

                        spawnCube(offsetX + x * spacing, offsetY + 0.5 + y * spacing, offsetZ + z * spacing, mat);
                    }
                }
            }
        }

        // ==========================================
        // LEVEL 4: BATTLEFIELD BUILDERS
        // ==========================================
        function buildBattlefield() {
            buildMountain(-12, 0, -12, 3);
            buildMountain(8, 0, -10, 3);
            buildMountain(-10, 0, 8, 2);
            buildMountain(10, 0, 10, 4);
            buildMountain(0, 0, -14, 2);
            buildMountain(-2, 0, 12, 3);
            
            buildTank(-4, 0, -3);
            buildTank(5, 0, 3);
            buildTank(-6, 0, 2);

            buildMissile(2, 0, -4);
            buildMissile(-2, 0, 6);
            buildMissile(6, 0, -2);
            buildMissile(0, 0, 2);
            buildMissile(-8, 0, -2);
        }

        function buildMountain(offsetX, offsetY, offsetZ, height) {
            for(let y = 0; y < height; y++) {
                let width = height - y; 
                for(let x = -width; x <= width; x++) {
                    for(let z = -width; z <= width; z++) {
                        if (Math.abs(x) + Math.abs(z) > width + 1) continue; 
                        let mat = (Math.random() > 0.5) ? materials.sand : materials.sandDark;
                        spawnLargeCube(offsetX + x * mSpacing, offsetY + 0.8 + y * mSpacing, offsetZ + z * mSpacing, mat);
                    }
                }
            }
        }

        function buildTank(offsetX, offsetY, offsetZ) {
            for(let x=0; x<6; x++) {
                for(let z=0; z<4; z+=3) { 
                    spawnCube(offsetX + x*spacing, offsetY + 0.5, offsetZ + z*spacing, materials.tankTreads);
                    spawnCube(offsetX + x*spacing, offsetY + 0.5 + spacing, offsetZ + z*spacing, materials.tankTreads);
                }
            }
            for(let x=1; x<5; x++) {
                for(let z=1; z<3; z++) {
                    spawnCube(offsetX + x*spacing, offsetY + 0.5 + spacing, offsetZ + z*spacing, materials.camoGreen);
                    spawnCube(offsetX + x*spacing, offsetY + 0.5 + 2*spacing, offsetZ + z*spacing, materials.camoGreen);
                }
            }
            for(let x=2; x<4; x++) {
                for(let z=1; z<3; z++) {
                    spawnCube(offsetX + x*spacing, offsetY + 0.5 + 3*spacing, offsetZ + z*spacing, materials.camoGreen);
                }
            }
            for(let x=4; x<8; x++) {
                spawnCube(offsetX + x*spacing, offsetY + 0.5 + 3*spacing, offsetZ + 1.5*spacing, materials.tankTreads);
            }
        }

        function buildMissile(offsetX, offsetY, offsetZ) {
            for(let y=0; y<8; y++) {
                for(let x=0; x<2; x++) {
                    for(let z=0; z<2; z++) {
                        let mat = materials.missileGray;
                        if (y === 0) mat = materials.missileRed; 
                        spawnCube(offsetX + x*spacing, offsetY + 0.5 + y*spacing, offsetZ + z*spacing, mat);
                    }
                }
            }
            spawnCube(offsetX + 0.5*spacing, offsetY + 0.5 + 8*spacing, offsetZ + 0.5*spacing, materials.missileRed);
            
            spawnCube(offsetX - spacing, offsetY + 0.5 + 0*spacing, offsetZ + 0.5*spacing, materials.missileRed);
            spawnCube(offsetX + 2*spacing, offsetY + 0.5 + 0*spacing, offsetZ + 0.5*spacing, materials.missileRed);
            spawnCube(offsetX + 0.5*spacing, offsetY + 0.5 + 0*spacing, offsetZ - spacing, materials.missileRed);
            spawnCube(offsetX + 0.5*spacing, offsetY + 0.5 + 0*spacing, offsetZ + 2*spacing, materials.missileRed);
        }

        // ==========================================
        // LEVEL 5: SUGAR RUSH BUILDERS
        // ==========================================
        function buildCandyland() {
            buildLayerCake(0, 0);
            let candyColors = [materials.candyRed, materials.candyCyan, materials.candyPurple, materials.frostingPink];

            for(let i=0; i<6; i++) {
                let angle = Math.random() * Math.PI * 2;
                let radius = 8 + Math.random() * 8; 
                let x = Math.cos(angle) * radius;
                let z = Math.sin(angle) * radius;
                let randomColor = candyColors[Math.floor(Math.random() * candyColors.length)];
                buildIceCreamCone(x, z, randomColor);
            }

            for(let i=0; i<12; i++) {
                let x = (Math.random() - 0.5) * 30;
                let z = (Math.random() - 0.5) * 30;
                if(Math.abs(x) < 5 && Math.abs(z) < 5) continue; 
                let randomColor = candyColors[Math.floor(Math.random() * 3)]; 
                buildLollipop(x, z, randomColor);
            }

            for(let i=0; i<80; i++) {
                let x = (Math.random() - 0.5) * 40;
                let z = (Math.random() - 0.5) * 40;
                if(Math.abs(x) < 3 && Math.abs(z) < 3) continue; 
                let randomColor = candyColors[Math.floor(Math.random() * candyColors.length)];
                spawnCube(x, 0.5, z, randomColor);
            }
        }

        function buildLayerCake(offsetX, offsetZ) {
            for(let y=0; y<2; y++) {
                for(let x=-2; x<=2; x++) {
                    for(let z=-2; z<=2; z++) {
                        if(Math.abs(x)===2 && Math.abs(z)===2) continue;
                        spawnLargeCube(offsetX + x*mSpacing, 0.5 + y*mSpacing, offsetZ + z*mSpacing, materials.cakeChoco);
                    }
                }
            }
            for(let y=2; y<4; y++) {
                for(let x=-1; x<=1; x++) {
                    for(let z=-1; z<=1; z++) {
                        spawnLargeCube(offsetX + x*mSpacing, 0.5 + y*mSpacing, offsetZ + z*mSpacing, materials.cakeVanilla);
                    }
                }
            }
            let topYBase = 4 * mSpacing;
            for(let y=0; y<2; y++) {
                for(let x=-1; x<=1; x++) {
                    for(let z=-1; z<=1; z++) {
                        if(Math.abs(x)===1 && Math.abs(z)===1) continue;
                        spawnCube(offsetX + x*spacing, 0.5 + topYBase + y*spacing, offsetZ + z*spacing, materials.candyRed);
                    }
                }
            }
        }

        function buildIceCreamCone(offsetX, offsetZ, flavorMat) {
            spawnLargeCube(offsetX, 0.5, offsetZ, materials.coneWafer);
            for(let x=-1; x<=1; x++) {
                for(let z=-1; z<=1; z++) {
                    if(Math.abs(x)===1 && Math.abs(z)===1) continue; 
                    spawnLargeCube(offsetX + x*mSpacing, 0.5 + mSpacing, offsetZ + z*mSpacing, materials.coneWafer);
                }
            }
            for(let x=-1; x<=1; x++) {
                for(let z=-1; z<=1; z++) {
                    spawnLargeCube(offsetX + x*mSpacing, 0.5 + 2*mSpacing, offsetZ + z*mSpacing, materials.coneWafer);
                }
            }
            for(let y=3; y<=4; y++) {
                for(let x=-1; x<=1; x++) {
                    for(let z=-1; z<=1; z++) {
                        spawnLargeCube(offsetX + x*mSpacing, 0.5 + y*mSpacing, offsetZ + z*mSpacing, flavorMat);
                    }
                }
            }
            spawnLargeCube(offsetX, 0.5 + 5*mSpacing, offsetZ, flavorMat);
        }

        function buildLollipop(offsetX, offsetZ, candyMat) {
            for(let y=0; y<7; y++) {
                spawnCube(offsetX, 0.5 + y*spacing, offsetZ, materials.stickWhite);
            }
            let headYBase = 6 * spacing; 
            for(let y=-2; y<=2; y++) {
                for(let x=-2; x<=2; x++) {
                    if(Math.abs(x)===2 && Math.abs(y)===2) continue; 
                    spawnCube(offsetX + x*spacing, 0.5 + headYBase + y*spacing, offsetZ, candyMat);
                }
            }
        }

        // ==========================================
        // LEVEL 6: GUITAR CENTER BUILDERS
        // ==========================================
        function buildGuitarCenter() {
            // Colorful stage rugs scattered around
            spawnDecorationTexturedPlane(5, 0.01, 5, 12, 12, 0x8A2BE2);
            spawnDecorationTexturedPlane(-8, 0.01, -6, 14, 14, 0xFF00FF);
            spawnDecorationTexturedPlane(0, 0.01, 10, 10, 20, 0x00FFFF);

            const electricColors = [materials.candyRed, materials.planeBlue, materials.neonPink, materials.neonCyan, materials.stickWhite, materials.darkBuilding];

            // Scatter Stratocasters
            buildStratocaster(0, -5, materials.candyRed);
            buildStratocaster(6, 4, materials.planeBlue);
            buildStratocaster(-6, -2, materials.neonPink);
            buildStratocaster(8, -8, materials.neonCyan);
            buildStratocaster(-10, 5, materials.stickWhite);
            buildStratocaster(10, 10, materials.guitarSunburst);

            // Scatter Flying Vs
            buildFlyingV(-4, -10, materials.darkBuilding);
            buildFlyingV(10, 0, materials.candyRed);
            buildFlyingV(-2, 8, materials.neonPink);
            buildFlyingV(4, 12, materials.planeBlue);
            buildFlyingV(-12, -4, materials.neonCyan);

            // Scatter Acoustics
            buildAcousticGuitar(2, 2);
            buildAcousticGuitar(-8, -8);
            buildAcousticGuitar(12, -5);
            buildAcousticGuitar(-6, 12);
            
            // Scatter colorful guitar picks
            for(let i=0; i<30; i++) {
                let x = (Math.random() - 0.5) * 30;
                let z = (Math.random() - 0.5) * 30;
                let pickColor = electricColors[Math.floor(Math.random() * electricColors.length)];
                spawnCube(x, 0.5, z, pickColor);
            }
        }

        function buildStratocaster(offsetX, offsetZ, bodyMat) {
            // Double cutaway body
            for(let z=0; z<=4; z++) {
                for(let x=-2; x<=2; x++) {
                    if ((z===0 && Math.abs(x)===2) || (z===3 && Math.abs(x)===2) || (z===4 && Math.abs(x)>0)) continue;
                    spawnCube(offsetX + x*spacing, 0.5, offsetZ + z*spacing, bodyMat);
                }
            }
            // Pickguard (white details)
            spawnCube(offsetX, 0.6, offsetZ + 1*spacing, materials.stickWhite);
            spawnCube(offsetX, 0.6, offsetZ + 2*spacing, materials.stickWhite);
            
            // Neck & Headstock
            for(let z=-5; z<0; z++) spawnCube(offsetX, 0.5, offsetZ + z*spacing, materials.woodDark);
            spawnCube(offsetX, 0.5, offsetZ - 6*spacing, materials.woodPine);
            spawnCube(offsetX + spacing, 0.5, offsetZ - 6*spacing, materials.woodPine);
        }

        function buildFlyingV(offsetX, offsetZ, bodyMat) {
            // V-Shape body
            for(let z=0; z<=5; z++) {
                let width = Math.floor(z / 2) + 1; 
                for(let x=-width; x<=width; x++) {
                    if (z > 2 && Math.abs(x) < Math.floor((z-1)/2)) continue; 
                    spawnCube(offsetX + x*spacing, 0.5, offsetZ + z*spacing, bodyMat);
                }
            }
            // Neck & Pointy Headstock
            for(let z=-5; z<0; z++) spawnCube(offsetX, 0.5, offsetZ + z*spacing, materials.woodDark);
            spawnCube(offsetX, 0.5, offsetZ - 6*spacing, materials.woodDark);
        }

        function buildAcousticGuitar(offsetX, offsetZ) {
            // Figure 8 body shape
            for(let z=0; z<=6; z++) {
                let r = (z===2 || z===3) ? 1 : 2;
                if (z===0 || z===6) r = 1;
                for(let x=-r; x<=r; x++) {
                    if (z===2 && x===0) {
                        spawnCube(offsetX, 0.5, offsetZ + z*spacing, materials.darkBuilding); // Sound hole
                    } else {
                        spawnCube(offsetX + x*spacing, 0.5, offsetZ + z*spacing, materials.woodPine);
                    }
                }
            }
            // Neck & Headstock
            for(let z=-5; z<0; z++) spawnCube(offsetX, 0.5, offsetZ + z*spacing, materials.woodDark);
            spawnCube(offsetX, 0.5, offsetZ - 6*spacing, materials.woodDark);
            spawnCube(offsetX + spacing, 0.5, offsetZ - 6*spacing, materials.woodDark);
            spawnCube(offsetX - spacing, 0.5, offsetZ - 6*spacing, materials.woodDark);
        }

        // ==========================================
        // LEVEL 7: LUSH FOREST BUILDERS
        // ==========================================
        function buildLushForest() {
            // Winding dirt path
            spawnDecorationTexturedPlane(0, 0.01, 0, 4, 30, 0x4A3728);

            // Log cabin in center
            buildCabin(0, 0, 0);

            // Procedural Forest Generation
            for(let i=0; i<12; i++) {
                let x = (Math.random() - 0.5) * 35;
                let z = (Math.random() - 0.5) * 35;
                // Keep path and cabin clear
                if(Math.abs(x) < 4 || (Math.abs(x) < 6 && Math.abs(z) < 6)) continue; 
                
                if (Math.random() > 0.4) {
                    buildPineTree(x, z);
                } else {
                    buildOakTree(x, z);
                }
            }

            // Scatter Rocks
            for(let i=0; i<8; i++) {
                let x = (Math.random() - 0.5) * 30;
                let z = (Math.random() - 0.5) * 30;
                if(Math.abs(x) < 3 || (Math.abs(x) < 6 && Math.abs(z) < 6)) continue;
                buildRockCluster(x, z);
            }
        }

        function buildCabin(offsetX, offsetY, offsetZ) {
            // Cabin Walls (Using small cubes for detail)
            for(let y=0; y<4; y++) {
                for(let x=-3; x<=3; x++) {
                    for(let z=-3; z<=3; z++) {
                        // Hollow interior
                        if(Math.abs(x)<3 && Math.abs(z)<3) continue;
                        // Doorway
                        if(z===-3 && Math.abs(x)<=1 && y<3) continue;
                        spawnCube(offsetX + x*spacing, offsetY + 0.5 + y*spacing, offsetZ + z*spacing, materials.woodDark);
                    }
                }
            }
            // Slanted Roof (Using Large blocks for performance)
            spawnLargeCube(offsetX, offsetY + 0.5 + 4*spacing, offsetZ, materials.woodPine);
            spawnLargeCube(offsetX - mSpacing, offsetY + 0.5 + 4*spacing, offsetZ, materials.woodPine);
            spawnLargeCube(offsetX + mSpacing, offsetY + 0.5 + 4*spacing, offsetZ, materials.woodPine);
            spawnLargeCube(offsetX, offsetY + 0.5 + 4*spacing + mSpacing, offsetZ, materials.woodPine); // Top peak
        }

        function buildPineTree(offsetX, offsetZ) {
            // Trunk
            spawnLargeCube(offsetX, 0.5, offsetZ, materials.woodDark);
            
            // Pine Foliage (Using Large Blocks)
            for(let y=1; y<=3; y++) {
                let w = (4-y);
                for(let x=-w; x<=w; x++) {
                    for(let z=-w; z<=w; z++) {
                        if(Math.abs(x)===w && Math.abs(z)===w) continue; // Round the layers
                        spawnLargeCube(offsetX + x*mSpacing, 0.5 + y*mSpacing, offsetZ + z*mSpacing, materials.leafDark);
                    }
                }
            }
        }

        function buildOakTree(offsetX, offsetZ) {
            // Thick Trunk
            spawnLargeCube(offsetX, 0.5, offsetZ, materials.woodDark);
            spawnLargeCube(offsetX, 0.5 + mSpacing, offsetZ, materials.woodDark);
            
            // Bushy Foliage
            for(let y=2; y<=3; y++) {
                for(let x=-1; x<=1; x++) {
                    for(let z=-1; z<=1; z++) {
                        // Random gaps for organic look
                        if (Math.random() > 0.8) continue;
                        spawnLargeCube(offsetX + x*mSpacing, 0.5 + y*mSpacing, offsetZ + z*mSpacing, materials.leafLight);
                    }
                }
            }
        }

        function buildRockCluster(offsetX, offsetZ) {
            let count = Math.floor(Math.random() * 3) + 1;
            for(let i=0; i<count; i++) {
                // Mix large and small rocks
                if (Math.random() > 0.5) {
                    spawnLargeCube(offsetX + (Math.random()-0.5)*mSpacing, 0.5, offsetZ + (Math.random()-0.5)*mSpacing, materials.stoneGray);
                } else {
                    spawnCube(offsetX + (Math.random()-0.5)*spacing*3, 0.5, offsetZ + (Math.random()-0.5)*spacing*3, materials.stoneGray);
                }
            }
        }

        // ==========================================
        // MAIN GAME LOGIC LOOP
        // ==========================================
        function handleGameLogic() {
            raycaster.setFromCamera(mouse, camera);
            let target = new THREE.Vector3();
            raycaster.ray.intersectPlane(groundPlane, target);
            if (target) {
                holeMesh.position.x += (target.x - holeMesh.position.x) * 0.2;
                holeMesh.position.z += (target.z - holeMesh.position.z) * 0.2;
            }

            const thresholdSetting = parseInt(document.getElementById('threshold-slider').value);
            const multiplierSetting = parseFloat(document.getElementById('multiplier-slider').value);

            for (let i = cubes.length - 1; i >= 0; i--) {
                let cube = cubes[i];

                cube.mesh.position.copy(cube.body.position);
                cube.mesh.quaternion.copy(cube.body.quaternion);

                let dx = cube.mesh.position.x - holeMesh.position.x;
                let dz = cube.mesh.position.z - holeMesh.position.z;
                let distance = Math.sqrt(dx*dx + dz*dz);

                let activationRadius = currentRadius * 3.5;
                if (cube.body.mass === 0 && distance < activationRadius) {
                    cube.body.mass = cube.isLargeBlock ? 2.5 : 0.5; 
                    cube.body.type = CANNON.Body.DYNAMIC;
                    cube.body.updateMassProperties();
                    cube.body.wakeUp();
                }

                if (!cube.isFalling) {
                    let speed = cube.body.velocity.length();
                    if (speed > 12) {
                        cube.body.velocity.scale(12 / speed, cube.body.velocity);
                    }
                }

                let isOutOfBounds = cube.mesh.position.x > 25 || 
                                    cube.mesh.position.x < -25 || 
                                    cube.mesh.position.z > 18 || 
                                    cube.mesh.position.z < -25 || 
                                    cube.mesh.position.y > 15;

                if (!cube.isFalling && distance < currentRadius * 1.1) {
                    cube.isFalling = true;
                    cube.body.collisionFilterMask = CUBE_GROUP; 
                }

                if (cube.isFalling) {
                    cube.body.velocity.x = -dx * 6;
                    cube.body.velocity.z = -dz * 6;
                    cube.body.velocity.y = -8;

                    if (cube.mesh.scale.x > 0.1) {
                        cube.mesh.scale.multiplyScalar(0.9);
                    }
                }

                if (cube.mesh.position.y < -3 || isOutOfBounds) {
                    scene.remove(cube.mesh);
                    world.remove(cube.body);
                    cubes.splice(i, 1);
                    
                    score++; 
                    updateUI();
                    playEatSound(); 
                    
                    // Check Growth
                    if (score - lastScaleScore >= thresholdSetting) {
                        sizeLevel++; 
                        lastScaleScore = score;
                        currentRadius *= multiplierSetting;
                        updateUI();
                        holeMesh.scale.set(currentRadius, currentRadius, 1);
                        playGrowSound(); 
                    }

                    // Check Win Condition
                    if (cubes.length === 0 && isPlaying) {
                        isPlaying = false;
                        
                        if (currentLevelIndex >= levels.length - 1) {
                            showGameComplete();
                        } else {
                            showLevelComplete();
                        }
                        
                        playVictorySound(); 
                    }
                }
            }
        }

        function showLevelComplete() {
            const overlay = document.getElementById('level-complete-overlay');
            overlay.style.display = 'flex';
        }

        function showGameComplete() {
            const overlay = document.getElementById('game-complete-overlay');
            overlay.style.display = 'flex';
        }

        function updateUI() {
            document.getElementById('score-display').innerText = score;
            document.getElementById('level-display').innerText = sizeLevel;
        }

        function animate() {
            requestAnimationFrame(animate);
            world.step(1 / 60);
            handleGameLogic();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
